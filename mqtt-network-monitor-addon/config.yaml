name: "MQTT Network Monitor"
description: "Network monitoring dashboard with MQTT client agents"
version: "0.2.1"
slug: "mqtt_network_monitor"
url: "https://github.com/user/mqtt-network-monitor"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
homeassistant_api: true
ingress: true
ingress_port: 8100
panel_icon: "mdi:lan"
panel_title: "Network Monitor"
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  log_level: "info"
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  log_level: list(debug|info|warning|error)
  mqtt_tls:
    name: MQTT TLS
    description: Enable TLS for MQTT connection
    required: false
    default: false
    type: bool
  mqtt_ca_cert:
    name: MQTT CA Certificate Path
    description: Path to CA certificate file for TLS verification
    required: false
    type: str
