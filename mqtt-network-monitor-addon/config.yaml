name: "MQTT Network Monitor"
description: "Network monitoring dashboard with MQTT client agents"
version: 0.3.9
slug: "mqtt_network_monitor"
url: "https://github.com/user/mqtt-network-monitor"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
homeassistant_api: true
ingress: true
ingress_port: 8100
panel_icon: "mdi:lan"
panel_title: "Network Monitor"
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  log_level: "info"
  mqtt_tls: false
  mqtt_ca_cert: ""
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  log_level: list(debug|info|warning|error)
  mqtt_tls: bool?
  mqtt_ca_cert: str?
