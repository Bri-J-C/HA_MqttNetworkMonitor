configuration:
  mqtt_host:
    name: MQTT Host
    description: Hostname or IP of the MQTT broker. Use "core-mosquitto" for the Mosquitto add-on.
  mqtt_port:
    name: MQTT Port
    description: Port number for the MQTT broker (default 1883).
  mqtt_user:
    name: MQTT Username
    description: Username for MQTT authentication. Leave empty if auth is disabled.
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT authentication. Leave empty if auth is disabled.
  log_level:
    name: Log Level
    description: Set the logging verbosity. Debug shows all messages, Error shows only errors.
