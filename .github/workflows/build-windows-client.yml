name: Build Windows Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install paho-mqtt psutil pyyaml pyinstaller

      - name: Set version from tag
        working-directory: monitor-clients/python
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version) { $version = "dev" }
          $content = "__version__ = `"$version`"`n"
          Set-Content -Path "mqtt_monitor/version.py" -Value $content
          Write-Host "Version: $version"
        shell: pwsh

      - name: Build installer
        working-directory: monitor-clients/python
        run: |
          python build_windows.py

      - name: Sign installer
        working-directory: monitor-clients/python
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=MQTT Network Monitor, O=HA_MqttNetworkMonitor" `
            -Type CodeSigningCert `
            -CertStoreLocation Cert:\CurrentUser\My `
            -NotAfter (Get-Date).AddYears(5)
          $exe = Get-ChildItem "dist\*-setup.exe" | Select-Object -First 1
          Set-AuthenticodeSignature `
            -FilePath $exe.FullName `
            -Certificate $cert `
            -TimestampServer "http://timestamp.digicert.com" `
            -HashAlgorithm SHA256
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mqtt-network-monitor-setup
          path: monitor-clients/python/dist/*-setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: monitor-clients/python/dist/*-setup.exe
          generate_release_notes: true
