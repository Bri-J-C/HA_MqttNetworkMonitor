name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Run all tests before building
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          cd mqtt-network-monitor-addon
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock httpx
      - name: Run server tests
        run: |
          cd mqtt-network-monitor-addon
          python -m pytest tests/ -v

  client-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          cd monitor-clients/python
          pip install paho-mqtt psutil PyYAML pytest
      - name: Run client tests
        run: |
          cd monitor-clients/python
          python -m pytest tests/ -v

  esp32-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run ESP32 host tests
        run: |
          cd monitor-clients/esp32/tests
          make test

  # Build Windows installer after tests pass
  build:
    needs: [server-tests, client-tests, esp32-tests]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install paho-mqtt psutil pyyaml pyinstaller

      - name: Set version from tag
        working-directory: monitor-clients/python
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version) { $version = "dev" }
          $content = "__version__ = `"$version`"`n"
          Set-Content -Path "mqtt_monitor/version.py" -Value $content
          Write-Host "Version: $version"
        shell: pwsh

      - name: Verify NSSM
        working-directory: monitor-clients/python
        shell: pwsh
        run: |
          if (-not (Test-Path nssm/nssm.exe)) { throw "nssm/nssm.exe not found in repo" }
          Write-Host "NSSM found: $(Get-Item nssm/nssm.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Build installer
        working-directory: monitor-clients/python
        run: |
          python build_windows.py

      - name: Sign installer
        working-directory: monitor-clients/python
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=MQTT Network Monitor, O=HA_MqttNetworkMonitor" `
            -Type CodeSigningCert `
            -CertStoreLocation Cert:\CurrentUser\My `
            -NotAfter (Get-Date).AddYears(5)
          $exe = Get-ChildItem "dist\*-setup.exe" | Select-Object -First 1
          Set-AuthenticodeSignature `
            -FilePath $exe.FullName `
            -Certificate $cert `
            -TimestampServer "http://timestamp.digicert.com" `
            -HashAlgorithm SHA256
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mqtt-network-monitor-setup
          path: monitor-clients/python/dist/*-setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: monitor-clients/python/dist/*-setup.exe
          generate_release_notes: true
