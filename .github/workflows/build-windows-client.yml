name: Build Windows Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install paho-mqtt psutil pyyaml pywin32 pyinstaller

      - name: Build executable
        working-directory: monitor-clients/python
        run: |
          python build_windows.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mqtt-network-monitor-windows
          path: monitor-clients/python/dist/mqtt-network-monitor.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: monitor-clients/python/dist/mqtt-network-monitor.exe
          generate_release_notes: true
